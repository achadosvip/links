<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achados VIP | Organização & Utilidades</title>

  <!--
    ╔══════════════════════════════════════════════════════╗
    ║  FONTES — edite aqui e em js/config.js               ║
    ║  Acesse fonts.google.com para escolher outras        ║
    ╚══════════════════════════════════════════════════════╝
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="logo-wrap" id="logoWrap"></div>
    <h1 id="brandNome"></h1>
    <p class="slogan" id="brandSlogan"></p>
    <a href="#" id="igLink" target="_blank" class="instagram-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
      </svg>
      <span></span>
    </a>
  </header>

  <!-- ── BUSCA ── -->
  <section class="search-section" aria-label="Busca de produtos">
    <div class="search-wrapper">
      <input
        type="search"
        id="searchInput"
        placeholder="Buscar por nome, Prod 001, 002..."
        oninput="filtrarProdutos()"
        aria-label="Buscar produto"
      />
      <span class="search-icon" aria-hidden="true">🔍</span>
    </div>
  </section>

  <!-- ── PRODUTOS ── -->
  <main class="products-section" aria-label="Lista de produtos">
    <p class="section-label">Produtos em destaque</p>
    <div id="productList"></div>
    <div class="empty-state" id="emptyState" aria-live="polite">
      <span class="empty-icon">🔍</span>
      Nenhum produto encontrado.
    </div>
  </main>

  <!-- ── RODAPÉ ── -->
  <footer>
    <div class="footer-logo" id="footerNome"></div>
    <p id="footerSlogan"></p>
    <div class="footer-divider"></div>
    <p>Instagram: <a href="#" id="footerIg" target="_blank"></a></p>
    <p class="footer-disclaimer">
      Links de afiliado — ao comprar pelo nosso link você nos apoia sem pagar nada a mais.
    </p>
  </footer>

  <!-- Scripts — config DEVE vir antes de app -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
